<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blue Archive — Character Browser</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1729;color:#e8efff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;background-image:radial-gradient(ellipse at top,#1a2845 0%,#0a1020 70%)}
h1{font-size:1.05rem;letter-spacing:.22em;text-transform:uppercase;color:#7eb6ff;margin-bottom:1.5rem;text-align:center;text-shadow:0 0 12px rgba(126,182,255,.4)}

.loading{padding:2rem;text-align:center;color:#a8c0e8;font-size:.9rem}
.loading-spinner{display:inline-block;width:28px;height:28px;border:3px solid #1a2845;border-top-color:#7eb6ff;border-radius:50%;animation:spin 1s linear infinite;margin-right:.6rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.search-row{display:flex;gap:.5rem;margin-bottom:1rem;width:100%;max-width:500px;flex-wrap:wrap}
.search-row input{flex:1;min-width:140px;padding:.5rem .75rem;border-radius:9px;border:1px solid #2a3a5a;background:#0a1530;color:#e8efff;font-size:.85rem;outline:none}
.search-row input:focus{border-color:#7eb6ff}
.search-row select{padding:.5rem .6rem;border-radius:9px;border:1px solid #2a3a5a;background:#0a1530;color:#a8c0e8;font-size:.78rem;outline:none;cursor:pointer}

.grid-toggle{background:#152040;color:#7eb6ff;border:1px solid #2a3a5a;border-radius:9px;padding:.4rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer;margin-bottom:.75rem;width:100%;max-width:500px;text-align:left}
.grid-toggle:hover{background:#1f2c50}
.char-grid{display:none;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:5px;max-width:500px;width:100%;margin-bottom:1rem;background:#0a1530;border:1.5px solid #2a3a5a;border-radius:14px;padding:.75rem;max-height:300px;overflow-y:auto}
.char-grid.open{display:grid}
.char-cell{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:4px 2px;border-radius:7px;transition:background .12s}
.char-cell:hover{background:#152040}
.char-cell.active{background:#1f2c50;outline:1.5px solid #7eb6ff}
.char-cell .ch-icon{width:48px;height:48px;border-radius:50%;border:1.5px solid #2a3a5a;background:#0a1020;overflow:hidden}
.char-cell .ch-icon img{width:100%;height:100%;object-fit:cover}
.char-cell span{font-size:.5rem;color:#7088b0;text-align:center;margin-top:2px;max-width:56px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.card{background:linear-gradient(180deg,#152040 0%,#0a1020 100%);border:2px solid #2a3a5a;border-radius:20px;padding:0 0 1.5rem;max-width:500px;width:100%;text-align:center;position:relative;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.card::before{content:'';position:absolute;inset:0;background:var(--cg,transparent);opacity:.08;pointer-events:none;z-index:0}

/* Hero portrait area: full character art with blurred backdrop */
.hero{position:relative;width:100%;aspect-ratio:3/4;max-height:520px;overflow:hidden;border-bottom:2px solid var(--cc,#7eb6ff);box-shadow:inset 0 -40px 60px -20px #0a1020}
.hero-bg{position:absolute;inset:-20px;background-size:cover;background-position:center top;filter:blur(28px) saturate(1.4) brightness(.6);opacity:.85;transform:scale(1.15)}
.hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center 30%, transparent 0%, rgba(10,16,32,.55) 75%, rgba(10,16,32,.95) 100%)}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;z-index:1;filter:drop-shadow(0 8px 24px rgba(0,0,0,.6))}
.hero-glow{position:absolute;inset:0;box-shadow:inset 0 0 80px var(--cc,#7eb6ff);opacity:.25;pointer-events:none;z-index:2}
.hero-overlay{position:absolute;left:0;right:0;bottom:0;padding:1.5rem 1.25rem 1rem;background:linear-gradient(180deg,transparent 0%,rgba(10,16,32,.85) 60%,#0a1020 100%);z-index:3;text-align:left}

/* Card body padding */
.card-body{padding:1.25rem 1.5rem 0;position:relative;z-index:1}

.school-tag{font-size:.68rem;letter-spacing:.22em;color:#cee5ff;text-transform:uppercase;margin-bottom:.25rem;opacity:.85;text-shadow:0 1px 3px #000}
.cname{font-size:2.2rem;font-weight:800;color:var(--cc,#cee5ff);margin-bottom:.15rem;text-shadow:0 2px 8px #000,0 0 20px rgba(0,0,0,.8);line-height:1;letter-spacing:.01em}
.cname-jp{font-size:.85rem;color:#a8c0e8;text-shadow:0 1px 3px #000;margin-bottom:0}

.badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:.9rem}
.badge{padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;backdrop-filter:blur(6px)}
.badge-school{background:rgba(126,182,255,.15);color:var(--cc,#7eb6ff);border:1px solid var(--cc,#7eb6ff)}
.badge-role{background:rgba(208,144,255,.15);color:#d090ff;border:1px solid rgba(208,144,255,.4)}
.badge-rare{background:rgba(255,208,137,.12);color:#ffd089;border:1px solid rgba(255,208,137,.4)}
.badge-rare.r3{color:#d090ff;background:rgba(208,144,255,.12);border-color:rgba(208,144,255,.4)}

.adesc{font-size:.92rem;line-height:1.7;color:#cee5ff;margin-bottom:1rem;text-align:left;background:rgba(0,0,0,.35);border-radius:10px;padding:.85rem 1rem;border-left:3px solid var(--cc,#7eb6ff)}

.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:.9rem}
.info-cell{background:rgba(0,0,0,.35);border-radius:10px;padding:.5rem .65rem;text-align:left;border:1px solid rgba(255,255,255,.04);transition:border-color .15s}
.info-cell:hover{border-color:var(--cc,#7eb6ff)}
.info-label{font-size:.58rem;color:#7088b0;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.2rem}
.info-value{font-size:.78rem;color:#e8efff;font-weight:500;line-height:1.3}

.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.pbar-wrap{flex:1;background:#04081a;border-radius:99px;height:5px}
.pbar{height:5px;background:linear-gradient(90deg,#7eb6ff,#a890ff);border-radius:99px;transition:width .3s}
.pnum-label{font-size:.7rem;color:#506080;white-space:nowrap}
.controls{display:flex;gap:.6rem}
.btn{padding:.55rem 1rem;border-radius:9px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;flex:1}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.25;cursor:default}
.btn-prev{background:#152040;color:#7088b0}
.btn-next{background:#7eb6ff;color:#0a1020}

/* Translation indicator */
.tr-status{font-size:.7rem;color:#7088b0;font-style:italic;margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.tr-status .mini-spin{display:inline-block;width:10px;height:10px;border:2px solid #1a2845;border-top-color:#7eb6ff;border-radius:50%;animation:spin .8s linear infinite}
.tr-status.done{color:#7ecf9e}
.tr-status.fail{color:#ff8060}

/* School color themes */
.school-Abydos      {--cc:#f0c878;--cg:radial-gradient(circle,#f0c878,transparent)}
.school-Arius       {--cc:#704090;--cg:radial-gradient(circle,#704090,transparent)}
.school-Gehenna     {--cc:#e85040;--cg:radial-gradient(circle,#e85040,transparent)}
.school-Hyakkiyako  {--cc:#90c878;--cg:radial-gradient(circle,#90c878,transparent)}
.school-Millennium  {--cc:#7eb6ff;--cg:radial-gradient(circle,#7eb6ff,transparent)}
.school-RedWinter   {--cc:#d04040;--cg:radial-gradient(circle,#d04040,transparent)}
.school-Shanhaijing {--cc:#a890ff;--cg:radial-gradient(circle,#a890ff,transparent)}
.school-SRT         {--cc:#80c0a0;--cg:radial-gradient(circle,#80c0a0,transparent)}
.school-Trinity     {--cc:#f0d088;--cg:radial-gradient(circle,#f0d088,transparent)}
.school-Valkyrie    {--cc:#a0b0c0;--cg:radial-gradient(circle,#a0b0c0,transparent)}
.school-ETC         {--cc:#7088b0;--cg:radial-gradient(circle,#7088b0,transparent)}
</style>
</head>
<body>
<h1>✦ Blue Archive — Characters</h1>

<div id="loadingScreen" class="loading">
  <div><span class="loading-spinner"></span>Loading characters...</div>
  <div style="margin-top:.5rem;font-size:.75rem;color:#506080" id="loadingStatus">Connecting to SchaleDB...</div>
</div>

<div id="mainUI" style="display:none;width:100%;display:flex;flex-direction:column;align-items:center">
  <div class="search-row">
    <input type="text" id="search" placeholder="Search name, school..." oninput="onSearch()"/>
    <select id="school-filter" onchange="onSearch()">
      <option value="">All schools</option>
    </select>
    <select id="role-filter" onchange="onSearch()">
      <option value="">All roles</option>
      <option value="Striker">Striker</option>
      <option value="Special">Special</option>
    </select>
  </div>

  <button class="grid-toggle" id="gridBtn" onclick="toggleGrid()">✦ Quick Select — browse all characters</button>
  <div class="char-grid" id="charGrid"></div>

  <div class="card" id="card">
    <div class="hero">
      <div class="hero-bg" id="heroBg"></div>
      <img class="hero-img" id="portrait" src="" alt=""/>
      <div class="hero-glow"></div>
      <div class="hero-overlay">
        <div class="school-tag" id="ptag"></div>
        <div class="cname" id="cname"></div>
        <div class="cname-jp" id="cnameJp"></div>
      </div>
    </div>
    <div class="card-body">
      <div class="badges" id="badges"></div>
      <div class="adesc" id="adesc"></div>
      <div class="info-grid" id="infoGrid"></div>
      <div class="progress-row">
        <span class="pnum-label" id="prog"></span>
        <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
      </div>
      <div class="controls">
        <button class="btn btn-prev" id="bPrev" onclick="go(-1)" disabled>&#8592; Prev</button>
        <button class="btn btn-next" id="bNext" onclick="go(1)">Next &#8594;</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA LOADING ──────────────────────────────────────────────────────────────
// SchaleDB hosts complete Blue Archive data. We fetch students.json and localization.min.json
// (both CORS-enabled) directly in the browser.

const SCHALE_BASE = 'https://schaledb.com';
const ICON_BASE = SCHALE_BASE + '/images/student/icon';
const PORTRAIT_BASE = SCHALE_BASE + '/images/student/portrait';
let CHARACTERS = [];
let filtered = [];
let idx = 0;

// Detect if text is mostly Japanese
function isJapanese(text) {
  if (!text) return false;
  const jp = (text.match(/[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/g) || []).length;
  return jp > text.length * 0.15;
}

function pickEnglishDesc(s) {
  const candidates = [s.ProfileIntroduction, s.CharacterIntroduction, s.Introduction].filter(Boolean);
  let desc = '';
  for (const c of candidates) {
    if (!isJapanese(c)) { desc = c; break; }
  }
  if (!desc) desc = candidates[0] || '';
  return normalizeDesc(desc);
}

// Translation cache keyed by source text
const TRANSLATION_CACHE = new Map();

// Translate Japanese text → English via Google Translate's public endpoint
// (gtx client, no API key required, CORS-enabled)
async function translateJaToFr(text) {
  if (!text) return '';
  if (TRANSLATION_CACHE.has(text)) return TRANSLATION_CACHE.get(text);

  // Google has a query length limit; chunk by sentences if needed
  const MAX = 1500;
  const chunks = [];
  if (text.length <= MAX) {
    chunks.push(text);
  } else {
    // split on sentence punctuation while keeping content
    const parts = text.split(/(?<=[。．.!?！?])/);
    let buf = '';
    for (const p of parts) {
      if ((buf + p).length > MAX && buf) { chunks.push(buf); buf = p; }
      else buf += p;
    }
    if (buf) chunks.push(buf);
  }

  const translatedChunks = [];
  for (const ch of chunks) {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q='
      + encodeURIComponent(ch);
    const r = await fetch(url);
    if (!r.ok) throw new Error('Translation HTTP ' + r.status);
    const data = await r.json();
    // Response: [[[ "translated", "original", null, null, ... ], ...], ...]
    const segs = (data[0] || []).map(seg => seg[0]).filter(Boolean);
    translatedChunks.push(segs.join(''));
  }

  const out = translatedChunks.join(' ').trim();
  TRANSLATION_CACHE.set(text, out);
  return out;
}

// Normalize description formatting:
// - Trim whitespace
// - Collapse all whitespace runs (incl. multiple newlines) into single spaces
// This produces ONE consistent flowing paragraph for every character.
function normalizeDesc(text) {
  return text
    .replace(/\r\n?/g, '\n')
    .split('\n')
    .map(line => line.trim())
    .filter(Boolean)
    .join(' ')
    .replace(/\s+/g, ' ')
    .trim();
}

async function loadCharacters() {
  const status = document.getElementById('loadingStatus');

  // Try multiple sources for resilience
  const SOURCES = [
    SCHALE_BASE + '/data/en/students.min.json',
    'https://cdn.jsdelivr.net/gh/SchaleDB/SchaleDB@main/data/en/students.min.json',
    'https://raw.githubusercontent.com/SchaleDB/SchaleDB/main/data/en/students.min.json',
  ];

  let data = null;
  for (const src of SOURCES) {
    status.textContent = 'Downloading from ' + new URL(src).hostname + '...';
    try {
      const r = await fetch(src);
      if (!r.ok) continue;
      data = await r.json();
      break;
    } catch (e) {}
  }

  if (!data) {
    status.innerHTML = '<span style="color:#ff8060">Unable to load data.</span><br>' +
      '<span style="font-size:.75rem">Check your internet connection.</span>';
    return;
  }

  // Data is an object keyed by ID; convert to array
  const list = Array.isArray(data) ? data : Object.values(data);
  status.textContent = 'Processing ' + list.length + ' characters...';

  CHARACTERS = list.map((s, i) => ({
    id: i,
    schaleId: s.Id,
    name: s.Name || s.PathName || ('Student ' + i),
    familyName: s.FamilyName || '',
    personalName: s.PersonalName || '',
    nameJp: (s.FamilyNameRuby ? s.FamilyNameRuby + ' ' : '') + (s.Name || ''),
    school: s.School || 'ETC',
    club: s.Club || '',
    age: s.CharacterAge || s.Age || '',
    birthday: s.Birthday || '',
    height: s.CharHeightMetric || s.Height || '',
    role: s.SquadType === 'Main' ? 'Striker' : (s.SquadType === 'Support' ? 'Special' : (s.SquadType || '')),
    rarity: s.StarGrade || 0,
    weapon: s.WeaponType || '',
    damageType: s.BulletType || '',
    armor: s.ArmorType || '',
    desc: pickEnglishDesc(s),
    hobby: s.Hobby || '',
    designer: s.Designer || '',
    illustrator: s.Illustrator || '',
    voice: s.CharacterVoice || s.Voice || '',
    iconUrl: ICON_BASE + '/' + s.Id + '.webp',
    portraitUrl: PORTRAIT_BASE + '/' + s.Id + '.webp',
  }));

  // Sort by school, then by release order (SchaleDB ID)
  CHARACTERS.sort((a, b) => {
    if (a.school !== b.school) return a.school.localeCompare(b.school);
    return (a.schaleId || 0) - (b.schaleId || 0);
  });
  CHARACTERS.forEach((c, i) => c.id = i);

  filtered = [...CHARACTERS];

  // Populate school filter
  const schools = [...new Set(CHARACTERS.map(c => c.school))].sort();
  const sel = document.getElementById('school-filter');
  for (const s of schools) {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  }

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainUI').style.display = 'flex';
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function stars(n) { return '★'.repeat(n) + '☆'.repeat(Math.max(0,3-n)); }

function buildText(c) {
  const fullName = (c.familyName + ' ' + c.personalName).trim();
  const lines = [];

  // Portrait
  lines.push(`[IMG]${c.portraitUrl}[/IMG]`);
  lines.push('');

  // Header: Name + rarity
  lines.push(`${c.name.toUpperCase()} ${stars(c.rarity)}`);
  if (fullName && fullName !== c.name) lines.push(`   ${fullName}`);
  lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━');

  // School & Role
  const headerBits = [];
  if (c.school) headerBits.push(`School: ${c.school}`);
  if (c.club)   headerBits.push(`Club: ${c.club}`);
  if (c.role)   headerBits.push(`Role: ${c.role}`);
  if (headerBits.length) lines.push(headerBits.join('  •  '));

  // Combat stats
  const combatBits = [];
  if (c.weapon)     combatBits.push(`Weapon: ${c.weapon}`);
  if (c.damageType) combatBits.push(`Damage: ${c.damageType}`);
  if (c.armor)      combatBits.push(`Armor: ${c.armor}`);
  if (combatBits.length) lines.push(combatBits.join('  •  '));

  // Personal info
  const personalBits = [];
  if (c.age)      personalBits.push(`Age: ${c.age}`);
  if (c.birthday) personalBits.push(`Birthday: ${c.birthday}`);
  if (c.height)   personalBits.push(`Height: ${c.height}`);
  if (personalBits.length) lines.push(personalBits.join('  •  '));

  // Hobby & VA on their own lines
  if (c.hobby) lines.push(`Hobby: ${c.hobby}`);
  if (c.voice) lines.push(`CV: ${c.voice}`);

  // Description
  if (c.desc) {
    lines.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push(c.desc);
  }

  return lines.join('\n');
}

// Token to abort stale translations when user navigates quickly
let renderToken = 0;

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  if (!filtered.length) return;
  const c = filtered[idx];
  const schoolClass = 'school-' + c.school.replace(/[^a-zA-Z]/g,'');
  const myToken = ++renderToken;

  document.getElementById('card').className = 'card ' + schoolClass;

  const portrait = document.getElementById('portrait');
  const heroBg = document.getElementById('heroBg');
  portrait.src = c.portraitUrl;
  heroBg.style.backgroundImage = `url("${c.portraitUrl}")`;
  portrait.onerror = function() {
    this.onerror = null;
    this.src = c.iconUrl;
    heroBg.style.backgroundImage = `url("${c.iconUrl}")`;
  };

  document.getElementById('ptag').textContent = c.school;
  document.getElementById('cname').textContent = c.name;
  document.getElementById('cnameJp').textContent = (c.familyName + ' ' + c.personalName).trim() || '\u00a0';

  document.getElementById('badges').innerHTML =
    `<span class="badge badge-school">${c.school}</span>` +
    (c.role ? `<span class="badge badge-role">${c.role}</span>` : '') +
    (c.rarity ? `<span class="badge badge-rare ${c.rarity===3?'r3':''}">${stars(c.rarity)}</span>` : '');

  // Description: translate from Japanese to French if needed
  const adesc = document.getElementById('adesc');
  const original = c.desc || '';
  if (!original) {
    adesc.innerHTML = '<em style="color:#506080">(No description)</em>';
  } else if (isJapanese(original)) {
    if (TRANSLATION_CACHE.has(original)) {
      adesc.textContent = TRANSLATION_CACHE.get(original);
    } else {
      // Show original + translating indicator while we fetch
      adesc.innerHTML =
        '<div class="tr-status"><span class="mini-spin"></span>Translating via Google…</div>'
        + escapeHtml(original);
      translateJaToFr(original).then(translated => {
        if (myToken !== renderToken) return; // user navigated away
        adesc.innerHTML =
          '<div class="tr-status done">✓ Translated from Japanese (Google Translate)</div>'
          + escapeHtml(translated);
      }).catch(err => {
        if (myToken !== renderToken) return;
        adesc.innerHTML =
          '<div class="tr-status fail">⚠ Translation failed — original text below</div>'
          + escapeHtml(original);
      });
    }
  } else {
    adesc.textContent = original;
  }

  const infoCells = [
    ['Club', c.club],
    ['Age', c.age],
    ['Birthday', c.birthday],
    ['Height', c.height],
    ['Weapon', c.weapon],
    ['Type', c.damageType],
    ['Armor', c.armor],
    ['Hobby', c.hobby],
    ['Voice', c.voice],
  ].filter(([_,v]) => v);

  document.getElementById('infoGrid').innerHTML = infoCells.map(([l,v]) =>
    `<div class="info-cell"><div class="info-label">${l}</div><div class="info-value">${v}</div></div>`
  ).join('');

  document.getElementById('prog').textContent = (idx+1) + ' / ' + filtered.length;
  document.getElementById('pbar').style.width = ((idx+1)/filtered.length*100).toFixed(1) + '%';
  document.getElementById('bPrev').disabled = idx === 0;
  document.getElementById('bNext').disabled = idx === filtered.length - 1;

  updateGridActive();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

function go(d) { idx = Math.max(0, Math.min(filtered.length-1, idx+d)); render(); }

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearch() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const school = document.getElementById('school-filter').value;
  const role = document.getElementById('role-filter').value;
  filtered = CHARACTERS.filter(c => {
    const okQ = !q || c.name.toLowerCase().includes(q)
      || (c.familyName + ' ' + c.personalName).toLowerCase().includes(q)
      || c.school.toLowerCase().includes(q)
      || (c.club || '').toLowerCase().includes(q);
    const okS = !school || c.school === school;
    const okR = !role || c.role === role;
    return okQ && okS && okR;
  });
  if (!filtered.length) filtered = [CHARACTERS[0]];
  idx = 0;
  const g = document.getElementById('charGrid');
  if (g.classList.contains('open')) buildGrid();
  render();
}

// ── GRID ──────────────────────────────────────────────────────────────────────
function toggleGrid() {
  const g = document.getElementById('charGrid');
  const btn = document.getElementById('gridBtn');
  const open = g.classList.toggle('open');
  btn.textContent = open ? '✕ Close' : '✦ Quick Select — browse all characters';
  if (open && g.children.length === 0) buildGrid();
}

function buildGrid() {
  const g = document.getElementById('charGrid');
  g.innerHTML = '';
  const limit = Math.min(filtered.length, 400);
  for (let i = 0; i < limit; i++) {
    const c = filtered[i];
    const cell = document.createElement('div');
    cell.className = 'char-cell' + (i === idx ? ' active' : '');
    cell.dataset.i = i;
    cell.title = c.name;
    cell.onclick = () => { idx = i; render(); updateGridActive(); };
    const ic = document.createElement('div');
    ic.className = 'ch-icon';
    const img = document.createElement('img');
    img.src = c.iconUrl;
    img.alt = c.name;
    img.loading = 'lazy';
    img.onerror = function(){ this.style.display='none'; };
    ic.appendChild(img);
    const lbl = document.createElement('span');
    lbl.textContent = c.name;
    cell.appendChild(ic);
    cell.appendChild(lbl);
    g.appendChild(cell);
  }
  if (filtered.length > limit) {
    const more = document.createElement('div');
    more.style.cssText = 'grid-column:1/-1;text-align:center;color:#506080;font-size:.7rem;padding:.5rem';
    more.textContent = `…${filtered.length - limit} more — refine your search`;
    g.appendChild(more);
  }
}

function updateGridActive() {
  document.querySelectorAll('.char-cell').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.i) === idx);
  });
  const a = document.querySelector('.char-cell.active');
  if (a) a.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('search') === document.activeElement) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

loadCharacters();
</script>
</body>
</html>
